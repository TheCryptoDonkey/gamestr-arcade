# Booth-specific overrides - bitfest-1 kiosk (Ubuntu 25.10, GNOME/Wayland).
# Installed to ~/.config/systemd/user/gamestr-arcade.service.d/ on that booth only.
# The shared unit targets classic-X11 booths; this adapts it:
#   1. No libfuse2 on 25.10 -> the AppImage cannot FUSE-mount. Extract it
#      (no FUSE needed) to ~/arcade-app whenever the shipped AppImage is newer,
#      then run AppRun directly. Re-extract is idempotent across redeploys.
#   2. The shared unit pins XAUTHORITY=%h/.Xauthority, absent under Wayland.
#      Resetting the env block lets the service inherit the session's real
#      DISPLAY=:0 + Xwayland XAUTHORITY (/run/user/1000/.mutter-Xwaylandauth.*)
#      + WAYLAND_DISPLAY, imported by gnome-session into the user manager.
#   3. Ubuntu AppArmor restricts unprivileged user namespaces. Install the
#      narrowly-scoped profile in systemd/apparmor-gamestr-arcade so Chromium's
#      own sandbox remains enabled; never disable it for a launcher that hosts
#      remote game content.
[Service]
Environment=
Environment=ARCADE_KIOSK=1
Environment=ARCADE_GAMES_DIR=%h/gamestr-games
Environment=APPDIR=%h/arcade-app
ExecStartPre=/bin/sh -c 'cd %h && if [ gamestr-arcade.AppImage -nt .arcade-extracted ]; then rm -rf squashfs-root arcade-app && ./gamestr-arcade.AppImage --appimage-extract >/dev/null && mv squashfs-root arcade-app && touch .arcade-extracted; fi'
ExecStart=
ExecStart=%h/arcade-app/AppRun
