services:
  phoenixd:
    image: acinq/phoenixd@sha256:27bb64fd93cdd96d5dbb01229952a95a05aa3e9c796751504fd5685ed6c1679c
    restart: unless-stopped
    command: ["--agree-to-terms-of-service", "--http-bind-ip", "0.0.0.0"]
    volumes:
      - phoenix-data:/phoenix/.phoenix
    networks: [wallet]
    security_opt: ["no-new-privileges:true"]
    healthcheck:
      test: ["CMD", "/phoenix/phoenix-cli", "getbalance"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  gateway:
    build: .
    restart: unless-stopped
    depends_on:
      phoenixd:
        condition: service_healthy
    env_file: ["${GATEWAY_ENV_FILE:-.env}"]
    environment:
      PHOENIXD_URL: http://phoenixd:9740
      STATE_PATH: /data/state.json
    volumes:
      - gateway-data:/data
    networks: [wallet]
    read_only: true
    tmpfs: [/tmp]
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/healthz').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  wallet:
    internal: false

volumes:
  phoenix-data:
  gateway-data:
