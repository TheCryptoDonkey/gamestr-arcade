appId: dev.forgesworn.gamestr-arcade
productName: gamestr arcade

directories:
  output: release
  buildResources: resources

files:
  - out/**

# Ship the cabinet config alongside the binary so a booth operator can retune
# the leaderboard / attract timeout / CRT without rebuilding (read from
# process.resourcesPath at runtime).
#
# Games are NOT bundled — they live in ~/gamestr-games on the booth and are
# deployed there independently by deploy.sh (via rsync). The arcade reads them
# at runtime via ARCADE_GAMES_DIR (set in gamestr-arcade.service).
extraResources:
  - from: arcade.config.json
    to: arcade.config.json

linux:
  target: [AppImage]
  category: Game
  syncDesktopName: true
  icon: resources/icon.png
  artifactName: gamestr-arcade-${version}-${arch}.AppImage
